name: Build RunPod Image

on:
  workflow_dispatch:
  push:
    branches:
      - salad-http-wrapper
    paths:
      - Dockerfile
      - entrypoint.sh
      - handler.py
      - I2V_multi.json
      - V2V_multi.json
      - I2V_single.json
      - V2V_single.json
      - .github/workflows/build-runpod.yml

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/infinitetalk-runpod:multi-masks
            ghcr.io/${{ github.repository_owner }}/infinitetalk-runpod:${{ github.sha }}
          provenance: false
